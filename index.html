<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Wheat Patch</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div class="background-orb background-orb-left"></div>
    <div class="background-orb background-orb-right"></div>

    <main class="game-shell">
      <header class="hero panel">
        <div>
          <p class="eyebrow">Mini Farm</p>
          <h1>Little Wheat Patch</h1>
          <p class="lede">
            Rearrange your farm like a little desktop, expand the land, and keep the plot groups tidy.
          </p>
        </div>
        <div class="hero-badge">
          <span class="badge-icon">&#127806;</span>
          <span>Drag, drop, and organize</span>
        </div>
      </header>

      <section id="status" class="panel status-panel" aria-live="polite"></section>
      <section id="farm-grid" class="farm-grid" aria-label="Farm layout grid"></section>
    </main>
  </body>
</html>
