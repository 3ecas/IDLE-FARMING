<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idle Farm</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="js/farmPage.js?v=3"></script>
  </head>
  <body>
    <main class="scene farm-page">
      <div class="grid-overlay"></div>
      <section id="workspace" class="workspace">
        <div id="cell-mount" class="cell-mount"></div>
        <div id="mill-mount" class="cell-mount"></div>
        <div id="bakery-mount" class="cell-mount"></div>
        <div id="animal-feeder-mount" class="cell-mount"></div>
        <div id="animal-pen-mount" class="cell-mount"></div>
        <div id="chicken-coop-mount" class="cell-mount"></div>
        <div id="beehive-mount" class="cell-mount"></div>
      </section>
      <nav class="side-tabs" data-side-tabs aria-label="Main menu">
        <button type="button" class="side-tab" data-side-tab="dashboard" aria-label="Dashboard">
          <span class="side-tab__icon" aria-hidden="true">☰</span>
        </button>
      </nav>
      <aside class="side-panel-shell" data-side-panel aria-hidden="true">
        <section class="side-panel-window">
          <header class="side-panel-header">
            <h1 data-side-panel-title></h1>
          </header>
          <div class="page-content side-panel-content" data-side-panel-content></div>
        </section>
      </aside>
      <div class="farm-controls">
        <div class="delete-zone" data-delete-zone>Delete</div>
      </div>
      <div id="status" class="status"></div>
    </main>
  </body>
</html>
